[pytest]
testpaths = tests
markers =
    ui: Playwright E2E tests
    api: API-level evaluation tests
    consistency: Non-determinism consistency tests
    adversarial: Prompt injection defense tests
    negativepath: Negative-path safety and compliance scenarios
    safety: Explicit safety and risk-warning validation tests
    p0: Critical business-impact smoke tests
addopts = --html=reports/test_report.html --self-contained-html
